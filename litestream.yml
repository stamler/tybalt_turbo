addr: ":9091"

snapshot:
  interval: 30m
  retention: 72h

validation:
  interval: 2h

dbs:
  - path: /app/pb_data/data.db
    replica:
      type: s3
      bucket: ${LITESTREAM_BUCKET}
      path: litestream
      region: ${LITESTREAM_REGION:-us-east-1}
      endpoint: ${LITESTREAM_ENDPOINT:-https://fly.storage.tigris.dev}
      access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
      secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}
      # Sync every 10 seconds in production.
      sync-interval: 10s
      # Prefer quick recovery after LTX/WAL mismatches over older PITR boundaries.
      auto-recover: true

logging:
  level: info
  type: text
  stderr: true
